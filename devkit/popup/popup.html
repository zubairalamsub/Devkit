<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevKit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div id="brand">
        <span id="brand-logo">{&nbsp;}</span>
        <span id="brand-name">DevKit</span>
        <button id="theme-toggle" title="Toggle dark / light theme">&#9681;</button>
      </div>
      <div id="search-wrap">
        <input id="tool-search" type="search" placeholder="Search tools&hellip;" autocomplete="off">
      </div>
      <nav id="nav"></nav>
    </aside>
    <main id="content"></main>
  </div>
  <div id="toast"></div>

  <script src="popup.js"></script>
  <script src="tools/json.js"></script>
  <script src="tools/encoders.js"></script>
  <script src="tools/jwt.js"></script>
  <script src="tools/convert.js"></script>
  <script src="tools/markdown.js"></script>
  <script src="tools/generators.js"></script>
  <script src="tools/gen2.js"></script>
  <script src="tools/qrcode.js"></script>
  <script src="tools/time.js"></script>
  <script src="tools/color.js"></script>
  <script src="tools/text.js"></script>
  <script src="tools/text2.js"></script>
  <script src="tools/compare.js"></script>
  <script src="tools/imagediff.js"></script>
  <script src="tools/design2.js"></script>
  <script src="tools/page.js"></script>
  <script src="tools/analysis.js"></script>
  <script src="tools/reference.js"></script>
  <script src="init.js"></script>
</body>
</html>
